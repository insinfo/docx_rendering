<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiptap Dart Demo</title>
  <link rel="icon" href="data:,">
  <script defer src="tiptap_demo.dart.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 16px;
    }

    #editor {
      min-height: 220px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 18px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
    }

    .ProseMirror {
      min-height: 180px;
      outline: none;
      white-space: pre-wrap;
    }

    .ProseMirror p {
      margin: 0 0 12px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Tiptap Dart Demo</h1>
    <div id="editor"></div>
  </main>
</body>
</html>
